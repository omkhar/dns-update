---
version: 2

project_name: dns-update

builds:
  - id: dns-update
    main: ./cmd/dns-update
    binary: dns-update
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=readonly
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w -buildid=
    targets:
      - linux_amd64_v1
      - linux_arm64
      - linux_arm_7
      - darwin_amd64_v1
      - darwin_arm64
      - windows_amd64_v1
      - windows_arm64

archives:
  - id: release-archives
    ids:
      - dns-update
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "arm" }}armv{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}
    wrap_in_directory: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "arm" }}armv{{ .Arm }}{{ else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE
      - config.example.json
      - cloudflare.token.example
      - deploy/**/*

checksum:
  name_template: checksums.txt
  algorithm: sha256
  extra_files:
    - glob: ./out/packages/deb/*/*.deb
    - glob: ./out/packages/rpm/*/*.rpm

changelog:
  disable: true

source:
  enabled: false

release:
  disable: true

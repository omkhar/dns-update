---
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Toronto
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps(go)
    groups:
      go-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Toronto
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps(actions)
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

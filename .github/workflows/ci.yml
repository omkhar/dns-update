---
name: CI

'on':
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-reviewability:
    name: Pull Request Reviewability
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Enforce reviewability limits
        shell: bash
        env:
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          MAX_CHANGED_FILES: "35"
          MAX_TOTAL_LINES: "3000"
        run: |
          changed_files="${PR_CHANGED_FILES:?}"
          additions="${PR_ADDITIONS:?}"
          deletions="${PR_DELETIONS:?}"
          total_lines=$((additions + deletions))
          if [ "$changed_files" -le "$MAX_CHANGED_FILES" ] &&
            [ "$total_lines" -le "$MAX_TOTAL_LINES" ]; then
            exit 0
          fi
          printf 'PR reviewability guard failed.\n' >&2
          printf 'changed files: %s (max %s)\n' "$changed_files" "$MAX_CHANGED_FILES" >&2
          printf 'total changed lines: %s (max %s)\n' "$total_lines" "$MAX_TOTAL_LINES" >&2
          printf 'Split the change before merge.\n' >&2
          exit 1

  lint-and-static:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          cache: true
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install lint tooling
        shell: bash
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          GOBIN="$RUNNER_TEMP/bin" go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          GOBIN="$RUNNER_TEMP/bin" go install \
            github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends shellcheck

      - name: Install YAML lint
        shell: bash
        run: |
          python3 -m venv "$RUNNER_TEMP/yamllint-venv"
          "$RUNNER_TEMP/yamllint-venv/bin/pip" install --disable-pip-version-check yamllint==1.37.1
          echo "$RUNNER_TEMP/yamllint-venv/bin" >> "$GITHUB_PATH"

      - name: Lint YAML
        run: yamllint .github .yamllint.yml

      - name: Lint GitHub Actions
        run: actionlint

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Check Go modules
        run: |
          go mod tidy -diff
          go mod verify

      - name: Check shell syntax
        run: sh -n packaging/*.sh deploy/launchd/*.sh

      - name: Lint shell scripts
        run: shellcheck -x packaging/*.sh deploy/launchd/*.sh

      - name: Check launchd plist escaping
        run: ./packaging/test-launchd-plist-escaping.sh

      - name: Check remote build local config parsing
        run: ./packaging/test-build-remote-container-local-config.sh

      - name: Lint Go
        run: >-
          golangci-lint run --timeout=5m --default=none --enable=errcheck
          --enable=ineffassign --enable=staticcheck --enable=unused ./...

      - name: Vet Go
        run: go vet ./...

      - name: Check reachable vulnerabilities
        run: govulncheck ./...

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          cache: true
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Unit and integration tests
        run: go test -count=1 ./...

      - name: Build
        run: go build ./...

      - name: Fuzz smoke test
        if: ${{ runner.os == 'Linux' }}
        run: |
          go test -run '^$' -fuzz '^FuzzNormalizeFQDN$' -fuzztime=15s ./internal/config
          go test -run '^$' -fuzz '^FuzzParseProbeURL$' -fuzztime=15s ./internal/config
          go test -run '^$' -fuzz '^FuzzParseResponse$' -fuzztime=15s ./internal/egress

      - name: Race test
        if: ${{ runner.os == 'Linux' }}
        env:
          DNS_UPDATE_SKIP_COVERAGE_TEST: "1"
          DNS_UPDATE_SKIP_MUTATION_TEST: "1"
        run: go test -race ./...

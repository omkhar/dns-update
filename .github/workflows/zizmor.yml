---
name: zizmor

'on':
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
  pull_request:
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
  workflow_dispatch:
  schedule:
    - cron: '23 5 * * 1'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read  # Check out repository workflows for static analysis.
      security-events: write  # Upload Zizmor SARIF results to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d
        with:
          inputs: |
            .github/workflows
            .github/dependabot.yml

---
name: zizmor

'on':
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
  pull_request:
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
  workflow_dispatch:
  schedule:
    - cron: '23 5 * * 1'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read  # Check out repository workflows for static analysis.
      security-events: write  # Upload Zizmor SARIF results to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa
        with:
          inputs: |
            .github/workflows
            .github/dependabot.yml

---
name: CodeQL

'on':
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read  # Check out repository contents for CodeQL analysis.
      security-events: write  # Upload CodeQL SARIF results to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
        with:
          languages: go
          build-mode: manual

      - name: Build for CodeQL
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81

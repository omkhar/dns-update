---
name: CodeQL

'on':
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * 1'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read  # Check out repository contents for CodeQL analysis.
      security-events: write  # Upload CodeQL SARIF results to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8
        with:
          languages: go
          build-mode: manual

      - name: Build for CodeQL
        run: go build ./...

      - name: Analyze
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8

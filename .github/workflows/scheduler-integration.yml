---
name: Scheduler Integration

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  launchd:
    name: macOS launchd
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod

      - name: Run launchd scheduler integration test
        run: |
          chmod +x deploy/launchd/install-launchd-job.sh packaging/test-launchd-scheduler.sh
          ./packaging/test-launchd-scheduler.sh

  windows-task-scheduler:
    name: Windows Task Scheduler
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod

      - name: Run Task Scheduler integration test
        shell: pwsh
        run: .\packaging\test-windows-task-scheduler.ps1

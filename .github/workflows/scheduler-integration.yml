---
name: Scheduler Integration

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  launchd:
    name: macOS launchd
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run launchd scheduler integration test
        run: |
          chmod +x deploy/launchd/install-launchd-job.sh packaging/test-launchd-scheduler.sh
          ./packaging/test-launchd-scheduler.sh

  windows-task-scheduler:
    name: Windows Task Scheduler
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run Task Scheduler integration test
        shell: pwsh
        run: .\packaging\test-windows-task-scheduler.ps1

---
name: Release

'on':
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          cache: false
          go-version-file: go.mod
          check-latest: true

      - name: Install cosign
        shell: bash
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.2
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install YAML lint
        shell: bash
        run: |
          python3 -m venv "$RUNNER_TEMP/yamllint-venv"
          "$RUNNER_TEMP/yamllint-venv/bin/pip" install --disable-pip-version-check yamllint==1.37.1
          echo "$RUNNER_TEMP/yamllint-venv/bin" >> "$GITHUB_PATH"

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            rpm \
            upx-ucl

      - name: Lint YAML
        run: yamllint .github .yamllint.yml

      - name: Verify tag matches packaged version
        shell: bash
        run: |
          . ./packaging/lib.sh
          version="$(package_version "$PWD")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$version" ]]; then
            echo "tag version $tag_version does not match packaged version $version" >&2
            exit 1
          fi

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Check packaging shell syntax
        run: sh -n packaging/*.sh

      - name: Unit and integration tests
        shell: bash
        run: |
          mapfile -t packages < <(go list ./... | grep -v '^dns-update/internal/quality$')
          go test -count=1 "${packages[@]}"

      - name: Coverage gate
        run: go test -count=1 -run '^TestCoverageThreshold$' ./internal/quality

      - name: Mutation gate
        run: go test -count=1 -run '^TestMutationSuite$' ./internal/quality

      - name: Race test
        env:
          DNS_UPDATE_SKIP_COVERAGE_TEST: "1"
          DNS_UPDATE_SKIP_MUTATION_TEST: "1"
        run: go test -race ./...

      - name: Lint Go
        run: go vet ./...

      - name: Build Linux release assets
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          out_dir="$PWD/out/release"
          tmp_dir="$PWD/out/release-tmp"
          mkdir -p "$out_dir" "$tmp_dir"

          while read -r goos goarch goarm suffix; do
            [[ -n "$goos" ]] || continue

            stage_dir="$tmp_dir/dns-update_${version}_${suffix}"
            binary_path="$stage_dir/dns-update"

            rm -rf "$stage_dir"
            mkdir -p "$stage_dir"

            env_args=("CGO_ENABLED=0" "GOOS=$goos" "GOARCH=$goarch")
            if [[ "$goarm" != "-" ]]; then
              env_args+=("GOARM=$goarm")
            fi

            env "${env_args[@]}" go build \
              -trimpath \
              -buildvcs=false \
              -ldflags "-s -w -buildid=" \
              -o "$binary_path" \
              ./cmd/dns-update

            cp README.md CHANGELOG.md LICENSE "$stage_dir/"

            tar -C "$tmp_dir" \
              -czf "$out_dir/dns-update_${version}_${suffix}.tar.gz" \
              "dns-update_${version}_${suffix}"
          done <<'EOF'
          linux amd64 - linux_amd64
          linux arm64 - linux_arm64
          linux arm 7 linux_armv7
          EOF

          PACKAGING_FORCE_DIRECT_DEB=1 \
          PACKAGING_SKIP_NATIVE_TESTS=1 \
          PACKAGING_SKIP_SIGN=1 \
            ./packaging/build-deb.sh

          PACKAGING_SKIP_BUILDDEPS=1 \
          PACKAGING_SKIP_NATIVE_TESTS=1 \
          PACKAGING_SKIP_SIGN=1 \
            ./packaging/build-rpm.sh

          find "$PWD/out/packages/deb" -type f -name '*.deb' -exec cp {} "$out_dir/" \;
          find "$PWD/out/packages/rpm" -type f -name '*.rpm' -exec cp {} "$out_dir/" \;

          (
            cd "$out_dir"
            sha256sum *.tar.gz *.deb *.rpm > checksums.txt
          )

      - name: Sign release artifacts
        shell: bash
        run: |
          . ./packaging/lib.sh
          set -- out/release/*
          sign_artifacts "$@"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "dns-update ${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          gh release upload "$GITHUB_REF_NAME" out/release/* --clobber

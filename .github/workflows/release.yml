---
name: Release

'on':
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          cache: true
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
          check-latest: true

      - name: Install cosign
        shell: bash
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.2
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends rpm unzip

      - name: Verify tag matches packaged version
        shell: bash
        run: |
          . ./packaging/lib.sh
          version="$(package_version "$PWD")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$version" ]]; then
            echo "tag version $tag_version does not match packaged version $version" >&2
            exit 1
          fi

      - name: Build release assets
        shell: bash
        run: |
          PACKAGING_FORCE_DIRECT_DEB=1 \
          PACKAGING_LINUX_MACROS=1 \
          PACKAGING_SKIP_BUILDDEPS=1 \
            ./packaging/build-release-assets.sh

      - name: Verify release asset contents
        shell: bash
        run: |
          mapfile -t artifacts < <(find out/release -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.zip' \) | LC_ALL=C sort)
          ./packaging/verify-release-assets.sh "${artifacts[@]}"

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: out/release
          format: spdx-json
          output-file: out/release/dns-update_${{ github.ref_name }}_sbom.spdx.json
          artifact-name: release-sbom
          upload-artifact: false
          upload-release-assets: false

      - name: Refresh checksums and attestation subjects
        id: subjects
        shell: bash
        run: |
          . ./packaging/lib.sh
          subjects_file="$RUNNER_TEMP/release-subjects.txt"
          mapfile -t subjects < <(find out/release -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.zip' \) | LC_ALL=C sort)
          (
            cd out/release
            mapfile -t checksummed < <(find . -maxdepth 1 -type f \
              ! -name '*.sigstore.json' \
              ! -name 'checksums.txt' | sed 's#^\./##' | LC_ALL=C sort)
            write_checksums checksums.txt "${checksummed[@]}"
          )
          : > "$subjects_file"
          (
            cd out/release
            mapfile -t subject_names < <(printf '%s\n' "${subjects[@]}" | sed 's#^out/release/##')
            write_checksums "$subjects_file" "${subject_names[@]}"
          )
          echo "subjects=$subjects_file" >> "$GITHUB_OUTPUT"

      - name: Sign release artifacts
        shell: bash
        run: |
          . ./packaging/lib.sh
          mapfile -t artifacts < <(find out/release -maxdepth 1 -type f ! -name '*.sigstore.json' | LC_ALL=C sort)
          sign_artifacts "${artifacts[@]}"

      - name: Verify checksums
        shell: bash
        run: |
          cd out/release
          sha256sum -c checksums.txt

      - name: Verify Sigstore signatures
        env:
          SIGSTORE_CERTIFICATE_IDENTITY: ${{ github.server_url }}/${{ github.repository }}/.github/workflows/release.yml@${{ github.ref }}
          SIGSTORE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        shell: bash
        run: |
          mapfile -t artifacts < <(find out/release -maxdepth 1 -type f ! -name '*.sigstore.json' | LC_ALL=C sort)
          ./packaging/verify-artifacts.sh "${artifacts[@]}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-checksums: ${{ steps.subjects.outputs.subjects }}

      - name: Attest release SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-checksums: ${{ steps.subjects.outputs.subjects }}
          sbom-path: out/release/dns-update_${{ github.ref_name }}_sbom.spdx.json

      - name: Verify build provenance attestations
        shell: bash
        run: |
          signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          for artifact in out/release/*.deb out/release/*.rpm out/release/*.tar.gz out/release/*.zip; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF"
          done

      - name: Verify SBOM attestations
        shell: bash
        run: |
          signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          for artifact in out/release/*.deb out/release/*.rpm out/release/*.tar.gz out/release/*.zip; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF" \
              --predicate-type https://spdx.dev/Document/v2.3
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "dns-update ${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          gh release upload "$GITHUB_REF_NAME" out/release/* --clobber

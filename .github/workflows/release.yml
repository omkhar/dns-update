---
name: Release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing SemVer tag to rebuild and publish
        required: true
        type: string
      rebuild_existing_release:
        description: >-
          Delete and recreate the mutable release for the tag before publishing
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: write # Publish GitHub attestations for the generated release assets.
      contents: write # Create and update release metadata and uploaded artifacts.
      id-token: write # Mint OIDC identities for Sigstore signing and attestations.
    steps:
      - name: Resolve release metadata
        id: release
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REBUILD_EXISTING_RELEASE: ${{ inputs.rebuild_existing_release }}
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_RELEASE_TAG"
          else
            release_tag="$GITHUB_REF_NAME"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must look like v1.2.3, got: $release_tag" >&2
            exit 1
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_ref=refs/tags/$release_tag"
            echo "release_version=${release_tag#v}"
            echo "rebuild_existing_release=${REBUILD_EXISTING_RELEASE:-false}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.release.outputs.release_ref }}

      - name: Resolve latest-release publishing mode
        id: latest
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          if [[ -z "$latest_tag" ]]; then
            echo "failed to determine latest release tag" >&2
            exit 1
          fi

          mark_latest=false
          if [[ "$RELEASE_TAG" == "$latest_tag" ]]; then
            mark_latest=true
          fi

          {
            echo "latest_tag=$latest_tag"
            echo "mark_latest=$mark_latest"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          cache: false
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install cosign
        shell: bash
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/sigstore/cosign/v2/cmd/cosign@v2.6.2
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends rpm unzip

      - name: Verify tag matches packaged version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          . ./packaging/lib.sh
          version="$(package_version "$PWD")"
          if [[ "$RELEASE_VERSION" != "$version" ]]; then
            echo "tag version $RELEASE_VERSION does not match packaged version $version" >&2
            exit 1
          fi

      - name: Build release assets
        shell: bash
        run: |
          PACKAGING_FORCE_DIRECT_DEB=1 \
          PACKAGING_LINUX_MACROS=1 \
          PACKAGING_SKIP_BUILDDEPS=1 \
            ./packaging/build-release-assets.sh

      - name: Verify release asset contents
        shell: bash
        run: |
          mapfile -t artifacts < <(find out/release -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.zip' \) |
              LC_ALL=C sort)
          ./packaging/verify-release-assets.sh "${artifacts[@]}"

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: out/release
          format: spdx-json
          output-file: >-
            out/release/dns-update_${{ steps.release.outputs.release_tag }}_sbom.spdx.json
          artifact-name: release-sbom
          upload-artifact: false
          upload-release-assets: false

      - name: Refresh checksums and attestation subjects
        id: subjects
        shell: bash
        run: |
          . ./packaging/lib.sh
          subjects_file="$RUNNER_TEMP/release-subjects.txt"
          mapfile -t subjects < <(find out/release -maxdepth 1 -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' -o -name '*.zip' \) |
              LC_ALL=C sort)
          (
            cd out/release
            mapfile -t checksummed < <(find . -maxdepth 1 -type f \
              ! -name '*.sigstore.json' \
              ! -name 'checksums.txt' | sed 's#^\./##' | LC_ALL=C sort)
            write_checksums checksums.txt "${checksummed[@]}"
          )
          : > "$subjects_file"
          (
            cd out/release
            mapfile -t subject_names < <(
              printf '%s\n' "${subjects[@]}" | sed 's#^out/release/##'
            )
            write_checksums "$subjects_file" "${subject_names[@]}"
          )
          echo "subjects=$subjects_file" >> "$GITHUB_OUTPUT"

      - name: Sign release artifacts
        shell: bash
        run: |
          . ./packaging/lib.sh
          mapfile -t artifacts < <(
            find out/release -maxdepth 1 -type f ! -name '*.sigstore.json' |
              LC_ALL=C sort
          )
          sign_artifacts "${artifacts[@]}"

      - name: Verify checksums
        shell: bash
        run: |
          cd out/release
          sha256sum -c checksums.txt

      - name: Verify Sigstore signatures
        env:
          SIGSTORE_CERTIFICATE_IDENTITY: >-
            ${{ github.server_url }}/${{ github.repository
            }}/.github/workflows/release.yml@${{ github.ref }}
          SIGSTORE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        shell: bash
        run: |
          mapfile -t artifacts < <(
            find out/release -maxdepth 1 -type f ! -name '*.sigstore.json' |
              LC_ALL=C sort
          )
          ./packaging/verify-artifacts.sh "${artifacts[@]}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-checksums: ${{ steps.subjects.outputs.subjects }}

      - name: Attest release SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
        with:
          subject-checksums: ${{ steps.subjects.outputs.subjects }}
          sbom-path: >-
            out/release/dns-update_${{ steps.release.outputs.release_tag }}_sbom.spdx.json

      - name: Verify build provenance attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          for artifact in \
            out/release/*.deb \
            out/release/*.rpm \
            out/release/*.tar.gz \
            out/release/*.zip; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF"
          done

      - name: Verify SBOM attestations
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          for artifact in \
            out/release/*.deb \
            out/release/*.rpm \
            out/release/*.tar.gz \
            out/release/*.zip; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer" \
              --source-ref "$GITHUB_REF" \
              --predicate-type https://spdx.dev/Document/v2.3
          done

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          MARK_LATEST: ${{ steps.latest.outputs.mark_latest }}
          REBUILD_EXISTING_RELEASE: ${{ steps.release.outputs.rebuild_existing_release }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')"
            is_immutable="$(gh release view "$RELEASE_TAG" --json isImmutable --jq '.isImmutable')"
            if [[ "$is_immutable" == "true" ]]; then
              echo "release $RELEASE_TAG is immutable and cannot be rebuilt in place" >&2
              exit 1
            fi

            if [[ "$is_draft" == "true" ]]; then
              gh release delete "$RELEASE_TAG" --yes
            elif [[ "$REBUILD_EXISTING_RELEASE" != "true" ]]; then
              echo "release $RELEASE_TAG already exists; rerun this workflow" \
                "with rebuild_existing_release=true to replace it from the" \
                "GitHub-hosted builder" >&2
              exit 1
            else
              gh release delete "$RELEASE_TAG" --yes
            fi
          fi

          gh release create "$RELEASE_TAG" out/release/* \
            --draft \
            --generate-notes \
            --title "dns-update $RELEASE_TAG" \
            --verify-tag

          if [[ "$MARK_LATEST" == "true" ]]; then
            gh release edit "$RELEASE_TAG" --draft=false --latest
          else
            gh release edit "$RELEASE_TAG" --draft=false
          fi

---
name: Systemd Integration

'on':
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '47 3 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  systemd:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian Stable
            label: debian-stable
            image: debian:stable-slim
            family: debian
          - name: Debian Unstable
            label: debian-unstable
            image: debian:unstable-slim
            family: debian
          - name: Ubuntu Stable
            label: ubuntu-stable
            image: ubuntu:rolling
            family: ubuntu
          - name: Ubuntu Unstable
            label: ubuntu-unstable
            image: ubuntu:devel
            family: ubuntu
          - name: Fedora Stable
            label: fedora-stable
            image: quay.io/fedora/fedora:43
            family: fedora
          - name: Fedora Unstable
            label: fedora-unstable
            image: quay.io/fedora/fedora:rawhide
            family: fedora
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends rpm

      - name: Run systemd timer integration test
        env:
          PACKAGING_SYSTEMD_TEST_MODE: package
        run: |
          chmod +x packaging/test-systemd-timer.sh
          ./packaging/test-systemd-timer.sh \
            --label "${{ matrix.label }}" \
            --image "${{ matrix.image }}" \
            --family "${{ matrix.family }}"

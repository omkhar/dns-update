---
name: Systemd Integration

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '47 3 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  systemd:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian Stable
            label: debian-stable
            floating_image: "debian:stable-slim"
            pinned_image: "debian:stable-slim@sha256:\
              99fc6d2a0882fcbcdc452948d2d54eab91faafc7db037df82425edcdcf950e1f"
            family: debian
          - name: Debian Unstable
            label: debian-unstable
            floating_image: "debian:unstable-slim"
            pinned_image: "debian:unstable-slim@sha256:\
              4629867cb5aa1f25958b91d0ac0a867308ec5a72d470811fc2e551df1e240087"
            family: debian
          - name: Ubuntu Stable
            label: ubuntu-stable
            floating_image: "ubuntu:rolling"
            pinned_image: "ubuntu:rolling@sha256:\
              4a9232cc47bf99defcc8860ef6222c99773330367fcecbf21ba2edb0b810a31e"
            family: ubuntu
          - name: Ubuntu Unstable
            label: ubuntu-unstable
            floating_image: "ubuntu:devel"
            pinned_image: "ubuntu:devel@sha256:\
              91832dcd7bc5e44c098ecefc0a251a5c5d596dae494b33fb248e01b6840f8ce0"
            family: ubuntu
          - name: Fedora Stable
            label: fedora-stable
            floating_image: "quay.io/fedora/fedora:43"
            pinned_image: "quay.io/fedora/fedora:43@sha256:\
              d1bc28d0d973a3aa5283df9e633c0a52333b1a05915966be0bc60b7305ec541b"
            family: fedora
          - name: Fedora Unstable
            label: fedora-unstable
            floating_image: "quay.io/fedora/fedora:rawhide"
            pinned_image: "quay.io/fedora/fedora:rawhide@sha256:\
              2ef4549d369cc3ea30d1965fcc4e8f75848f3361eca3515f3f0d1a1441806d84"
            family: fedora
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends rpm

      - name: Select systemd test image
        id: test-image
        env:
          EVENT_NAME: ${{ github.event_name }}
          FLOATING_IMAGE: ${{ matrix.floating_image }}
          PINNED_IMAGE: ${{ matrix.pinned_image }}
        run: |
          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            echo "image=${FLOATING_IMAGE}" >> "${GITHUB_OUTPUT}"
            echo "mode=drift" >> "${GITHUB_OUTPUT}"
          else
            echo "image=${PINNED_IMAGE}" >> "${GITHUB_OUTPUT}"
            echo "mode=deterministic" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run systemd timer integration test
        env:
          EXPECTED_FLOATING_IMAGE: ${{ matrix.floating_image }}
          EXPECTED_PINNED_IMAGE: ${{ matrix.pinned_image }}
          PACKAGING_SYSTEMD_TEST_MODE: package
          TEST_FAMILY: ${{ matrix.family }}
          TEST_IMAGE: ${{ steps.test-image.outputs.image }}
          TEST_LABEL: ${{ matrix.label }}
          TEST_MODE: ${{ steps.test-image.outputs.mode }}
        run: |
          set -euo pipefail
          case "${TEST_LABEL}" in
            debian-stable|\
            debian-unstable|\
            ubuntu-stable|\
            ubuntu-unstable|\
            fedora-stable|\
            fedora-unstable)
              ;;
            *)
              echo "Unexpected systemd test label: ${TEST_LABEL}" >&2
              exit 1
              ;;
          esac

          case "${TEST_FAMILY}" in
            debian|ubuntu|fedora) ;;
            *)
              echo "Unexpected systemd test family: ${TEST_FAMILY}" >&2
              exit 1
              ;;
          esac

          if [[ "${TEST_IMAGE}" != "${EXPECTED_PINNED_IMAGE}" \
            && "${TEST_IMAGE}" != "${EXPECTED_FLOATING_IMAGE}" ]]; then
            echo "Unexpected systemd test image: ${TEST_IMAGE}" >&2
            exit 1
          fi

          echo "Running ${TEST_MODE} coverage against ${TEST_IMAGE}"

          chmod +x packaging/test-systemd-timer.sh
          ./packaging/test-systemd-timer.sh \
            --label "${TEST_LABEL}" \
            --image "${TEST_IMAGE}" \
            --family "${TEST_FAMILY}"

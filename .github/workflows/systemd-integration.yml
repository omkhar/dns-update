---
name: Systemd Integration

'on':
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '47 3 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  systemd:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian Stable
            label: debian-stable
            floating_image: "debian:stable-slim"
            pinned_image: "debian:stable-slim@sha256:\
              328d16499860ae6cb9b345e2e4cebca08c2a36e4f7278482c7bd1f39d71e5bfd"
            family: debian
          - name: Debian Unstable
            label: debian-unstable
            floating_image: "debian:unstable-slim"
            pinned_image: "debian:unstable-slim@sha256:\
              153e7023d3501a4a980f54fd3e8560c029109bb1a3475fcc5047fc948da553ab"
            family: debian
          - name: Ubuntu Stable
            label: ubuntu-stable
            floating_image: "ubuntu:rolling"
            pinned_image: "ubuntu:rolling@sha256:\
              3131b4cc82a783df6c9df078f86e01819a13594b865c2cad47bd1bca2b7063bb"
            family: ubuntu
          - name: Ubuntu Unstable
            label: ubuntu-unstable
            floating_image: "ubuntu:devel"
            pinned_image: "ubuntu:devel@sha256:\
              694b773ee7e0d0b55ca74c095ac3309055589e7cbfaf3100f0b226c38c6936fa"
            family: ubuntu
          - name: Fedora Stable
            label: fedora-stable
            floating_image: "fedora:44"
            pinned_image: "fedora:44@sha256:\
              6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898"
            family: fedora
          - name: Fedora Unstable
            label: fedora-unstable
            floating_image: "fedora:rawhide"
            pinned_image: "fedora:rawhide@sha256:\
              0c1f63ed8fb818fad16cf6ae091598c410a21d2e1a9adf183beb93189299bfba"
            family: fedora
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends rpm

      - name: Select systemd test image
        id: test-image
        env:
          EVENT_NAME: ${{ github.event_name }}
          FLOATING_IMAGE: ${{ matrix.floating_image }}
          PINNED_IMAGE: ${{ matrix.pinned_image }}
        run: |
          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            echo "image=${FLOATING_IMAGE}" >> "${GITHUB_OUTPUT}"
            echo "mode=drift" >> "${GITHUB_OUTPUT}"
          else
            echo "image=${PINNED_IMAGE}" >> "${GITHUB_OUTPUT}"
            echo "mode=deterministic" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run systemd timer integration test
        env:
          EXPECTED_FLOATING_IMAGE: ${{ matrix.floating_image }}
          EXPECTED_PINNED_IMAGE: ${{ matrix.pinned_image }}
          PACKAGING_SYSTEMD_TEST_MODE: package
          TEST_FAMILY: ${{ matrix.family }}
          TEST_IMAGE: ${{ steps.test-image.outputs.image }}
          TEST_LABEL: ${{ matrix.label }}
          TEST_MODE: ${{ steps.test-image.outputs.mode }}
        run: |
          set -euo pipefail
          case "${TEST_LABEL}" in
            debian-stable|\
            debian-unstable|\
            ubuntu-stable|\
            ubuntu-unstable|\
            fedora-stable|\
            fedora-unstable)
              ;;
            *)
              echo "Unexpected systemd test label: ${TEST_LABEL}" >&2
              exit 1
              ;;
          esac

          case "${TEST_FAMILY}" in
            debian|ubuntu|fedora) ;;
            *)
              echo "Unexpected systemd test family: ${TEST_FAMILY}" >&2
              exit 1
              ;;
          esac

          if [[ "${TEST_IMAGE}" != "${EXPECTED_PINNED_IMAGE}" \
            && "${TEST_IMAGE}" != "${EXPECTED_FLOATING_IMAGE}" ]]; then
            echo "Unexpected systemd test image: ${TEST_IMAGE}" >&2
            exit 1
          fi

          echo "Running ${TEST_MODE} coverage against ${TEST_IMAGE}"

          chmod +x packaging/test-systemd-timer.sh
          ./packaging/test-systemd-timer.sh \
            --label "${TEST_LABEL}" \
            --image "${TEST_IMAGE}" \
            --family "${TEST_FAMILY}"

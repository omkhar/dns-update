---
name: Bug report
description: Report a reproducible defect in dns-update.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please keep it focused and reproducible.

        Do not use this form for undisclosed security vulnerabilities.
        Follow `SECURITY.md` instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: >-
        Exact steps, config shape, and commands needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Use config ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit, tag, or branch
      description: If known, provide the exact revision you tested.
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant output with secrets removed.
      render: text
